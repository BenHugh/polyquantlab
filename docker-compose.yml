services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: stock_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      # ClickHouse runs *.sql files in /docker-entrypoint-initdb.d/ alphabetically.
      # Use prefixed names to control order: schema first, then candle views.
      - ./db/clickhouse_init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./db/migrations/001_candles.sql:/docker-entrypoint-initdb.d/01_candles.sql:ro
      - ./db/migrations/002_binance_trades.sql:/docker-entrypoint-initdb.d/02_binance_trades.sql:ro
    environment:
      CLICKHOUSE_DB: stock
      CLICKHOUSE_USER: stock
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-changeme}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: stock_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: stock
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d stock"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stock_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
